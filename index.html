<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mia Giornata</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon"
        href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233b82f6'/><text x='50%' y='50%' font-size='60' text-anchor='middle' dominant-baseline='central' fill='white'>📅</text></svg>">
</head>

<body>
    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <div class="background-glow"></div>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>Tabella della <span class="highlight">Giornata</span></h1>
                <p id="date-display" class="date-display">Caricamento data...</p>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="edit-btn" title="Modifica Tabella">
                    <i class='bx bx-edit'></i>
                </button>
                <div class="progress-ring-container" title="Progresso Giornaliero">
                    <svg class="progress-ring" width="60" height="60">
                        <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.1)" stroke-width="4"
                            fill="transparent" r="26" cx="30" cy="30" />
                        <circle class="progress-ring__circle" id="progress-circle" stroke="#3b82f6" stroke-width="4"
                            fill="transparent" r="26" cx="30" cy="30" />
                    </svg>
                    <span id="progress-text" class="progress-text">0%</span>
                </div>
            </div>
        </header>

        <nav class="agenda-nav">
            <button class="nav-btn" id="prev-day" title="Giorno Precedente">
                <i class='bx bx-chevron-left'></i>
            </button>
            <div class="date-picker-wrapper">
                <button class="date-picker-btn" id="today-btn">Oggi</button>
                <input type="date" id="calendar-input" class="calendar-input">
                <label for="calendar-input" class="calendar-label">
                    <i class='bx bx-calendar'></i>
                </label>
            </div>
            <button class="nav-btn" id="next-day" title="Giorno Successivo">
                <i class='bx bx-chevron-right'></i>
            </button>
        </nav>

        <main>
            <div class="schedule-list" id="schedule-list">
                <!-- Tasks injected by JavaScript -->
            </div>
            <div class="all-done-message" id="all-done-message">
                <i class='bx bxs-party'></i>
                <h3>Giornata Completata!</h3>
                <p>Ottimo lavoro. Hai completato tutte le attività previste per oggi.</p>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Modifica <span class="highlight">Tabella</span></h2>
                <button class="close-btn" id="close-modal-btn"><i class='bx bx-x'></i></button>
            </div>

            <div class="modal-tabs">
                <button class="modal-tab-btn active" data-edit-day="standard">Standard</button>
                <button class="modal-tab-btn" data-edit-day="mercoledi">Mercoledì</button>
                <button class="modal-tab-btn" data-edit-day="venerdi">Venerdì</button>
                <button class="modal-tab-btn highlight-tab" id="specific-date-tab" data-edit-day="specific">Evento
                    Singolo (Data)</button>
            </div>

            <div class="modal-body">
                <div id="edit-tasks-container" class="edit-tasks-container">
                    <!-- Tasks injected by JavaScript -->
                </div>
                <button class="add-task-btn" id="add-task-btn">
                    <i class='bx bx-plus'></i> Aggiungi Attività
                </button>
            </div>

            <div class="modal-footer">
                <div class="footer-left" style="display:flex; gap:0.5rem; flex:1;">
                    <button class="btn btn-secondary" id="export-btn" title="Esporta Dati"><i
                            class='bx bx-export'></i></button>
                    <button class="btn btn-secondary" id="import-btn" title="Importa Dati"><i
                            class='bx bx-import'></i></button>
                    <input type="file" id="import-file-input" accept=".json" style="display:none">
                </div>
                <div class="footer-right" style="display:flex; gap:1rem;">
                    <button class="btn btn-secondary" id="cancel-edit-btn">Annulla</button>
                    <button class="btn btn-primary" id="save-edit-btn">Salva Modifiche</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
